  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:    #e9e4d6;   /* warm paper */
      --ink:   #262019;   /* soft near-black, warm */
      --dim:   #6b6353;   /* muted taupe, ~4.5:1 on paper */
      --link:  #262019;   /* links are ink; they invert on hover */
      --accent:#a44526;   /* warm terracotta accent, ~4.78:1 on --bg (WCAG AA) */
      --mono:  "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.014) 0px, rgba(0,0,0,0.014) 1px,
        transparent 1px, transparent 3px);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.5;
      display: grid;
      grid-template-columns: minmax(0, 620px);
      justify-content: center;
      align-content: center;
      padding: clamp(0.9rem, 4vw, 1.5rem);
      overflow-x: hidden;
    }

    .win {
      width: 100%;
      min-width: 0;
      background: var(--bg);
      border: 1.5px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      display: flex;
      flex-direction: column;
      max-height: min(88dvh, 760px);
      animation: pop 0.5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* title bar */
    .bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 0.7rem;
      border-bottom: 1.5px solid var(--ink);
      background: repeating-linear-gradient(to bottom,
        var(--ink) 0, var(--ink) 1px, transparent 1px, transparent 3px);
      flex: none;
      min-width: 0;
    }
    .bar .geo { white-space: nowrap; }
    @media (max-width: 400px) { .bar .geo { display: none; } }
    .bar .dot { width: 11px; height: 11px; border: 1.5px solid var(--ink);
      background: var(--bg); border-radius: 50%; }
    .bar .title { margin: 0 auto; background: var(--bg); padding: 0 0.6rem;
      font-size: 12px; font-weight: 700; letter-spacing: 0.02em; }
    .bar .geo { background: var(--bg); padding: 0 0.5rem; font-size: 11px;
      color: var(--dim); letter-spacing: 0.03em; }

    /* screen */
    .screen {
      padding: clamp(0.9rem, 3vw, 1.3rem);
      overflow-y: auto;
      flex: 1;
      cursor: text;
      scrollbar-width: thin;
    }
    .screen::-webkit-scrollbar { width: 8px; }
    .screen::-webkit-scrollbar-thumb { background: var(--dim); }

    .line { white-space: pre-wrap; word-break: break-word; }
    .echo { color: var(--dim); margin-top: 0.55rem; }
    .echo .p { color: var(--accent); }
    .name { font-size: clamp(1.5rem, 6vw, 2.1rem); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 0.1rem; }
    .quote { color: var(--ink); border-left: 2px solid var(--accent);
      padding-left: 0.8rem; margin: 0.45rem 0 0.1rem; max-width: 46ch; }
    .quote cite { display:block; margin-top: 0.25rem; color: var(--dim);
      font-style: normal; font-size: 12.5px; letter-spacing: 0.04em; }
    .muted { color: var(--dim); }
    .accent { color: var(--accent); }

    .entry { margin: 0.3rem 0 0; }
    .entry + .entry { margin-top: 0.7rem; }
    .entry .h { font-weight: 700; }
    .entry .sub { color: var(--dim); font-size: 13px; }
    .entry .d { margin-top: 0.1rem; max-width: 54ch; }
    .block { margin: 0.25rem 0 0.5rem; }

    /* neofetch card */
    .fetch { display: grid; gap: 0.1rem; }
    .frow { display: flex; gap: 0.75rem; }
    .frow .fk { color: var(--accent); flex: none; width: 5.5rem; }
    .frow .fv { color: var(--ink); min-width: 0; }

    a { color: var(--link); text-decoration: underline; text-underline-offset: 3px;
      text-decoration-color: var(--accent); }
    a:hover, a:focus-visible { background: var(--ink); color: var(--bg);
      text-decoration: none; outline: none; }

    /* prompt input line */
    .promptline { display: flex; align-items: baseline; gap: 0.5rem; margin-top: 0.7rem; }
    .promptline .p { color: var(--accent); flex: none; }
    #cmd {
      flex: 1; background: transparent; border: 0; outline: 0;
      font: inherit; color: var(--ink); caret-color: var(--accent);
      padding: 0; min-width: 0;
    }
    #cmd::placeholder { color: var(--dim); opacity: 0.7; }

    /* clickable command chips */
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.65rem; }
    .chips button {
      font: inherit; font-size: 12.5px; letter-spacing: 0.04em;
      color: var(--ink); background: transparent;
      border: 1.5px solid var(--ink); padding: 0.2rem 0.6rem;
      cursor: pointer; transition: background .12s, color .12s;
    }
    .chips button:hover, .chips button:focus-visible {
      background: var(--ink); color: var(--bg); outline: none; }
    .chips .hint { align-self: center; color: var(--dim); font-size: 11.5px;
      border: 0; padding: 0; cursor: default; }

    @media (prefers-reduced-motion: reduce) { .win { animation: none; } }

<body>
  <div class="win" id="win">
    <div class="bar" aria-hidden="true">
      <span class="dot"></span>
      <span class="title">yazan.home</span>
      <span class="geo">43.47°N 79.69°W · <span id="clock">--:--</span></span>
    </div>

    <div class="screen" id="screen">
      <div id="log" aria-live="polite"></div>

      <div class="promptline">
        <span class="p" aria-hidden="true">$</span>
        <input id="cmd" autocomplete="off" autocapitalize="off"
               spellcheck="false" aria-label="terminal command"
               placeholder="type a command, or tap below…" />
      </div>

      <div class="chips" id="chips">
        <button data-cmd="about">about</button>
        <button data-cmd="work">work</button>
        <button data-cmd="projects">projects</button>
        <button data-cmd="hobbies">hobbies</button>
        <button data-cmd="contact">contact</button>
        <span class="hint">or type 'help'</span>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var screen = document.getElementById('screen');
    var log = document.getElementById('log');
    var input = document.getElementById('cmd');
    var chips = document.getElementById('chips');

    var LINKS = {
      email: 'mailto:yazan.was2@gmail.com',
      github: 'https://github.com/yazanqwasmi',
      linkedin: 'https://www.linkedin.com/in/yazan-qwasmi/'
    };

    // all copy below is written fresh — not lifted from the résumé
    var C = {
      whoami: function () {
        return ''
          + '<div class="name">Yazan Qwasmi</div>'
          + '<div class="muted">electrical engineering @ mcmaster · builder</div>'
          + '<blockquote class="quote">&ldquo;the mystery of human existence lies not in just '
          + 'staying alive, but in finding something to live for.&rdquo;'
          + '<cite>dostoevsky</cite></blockquote>';
      },
      help: function () {
        return '<div class="block">commands: '
          + '<span class="accent">about</span>, '
          + '<span class="accent">work</span>, '
          + '<span class="accent">projects</span>, '
          + '<span class="accent">hobbies</span>, '
          + '<span class="accent">contact</span>, '
          + '<span class="accent">neofetch</span>, '
          + '<span class="accent">clear</span>. '
          + '<span class="muted">(tab completes, ↑ for history — and a few things aren\'t listed)</span></div>';
      },
      ls: function () { return '<div class="block muted">about  work  projects  hobbies  contact</div>'; },
      about: function () {
        return '<div class="block">i build across the whole stack, from PCBs, through GPU '
          + 'kernels, up to the software running on top — i just love anything tech. right now '
          + 'i\'m finishing electrical engineering at mcmaster (2027), picking up an IEEE paper '
          + 'along the way. off the keyboard, i\'m probably outside, or somewhere with worse '
          + 'wifi.</div>';
      },
      work: function () {
        return '<div class="block">'
          + entry('RBC · royal bank of canada', 'automation developer · 2026',
              'built an AI copilot that searches years of past incidents and hands the on-call '
              + 'engineer a likely fix. it runs retrieval over the internal knowledge base and '
              + 'plugs straight into the tools support already uses. also folded four separate '
              + 'production systems into one pipeline.')
          + entry('serene technology group', 'software engineer · 2025',
              'shipped react + typescript features across sprints, hardened the flaky data flows '
              + 'behind them, and set up the CI that lints, tests, and deploys on every merge.')
          + '</div>';
      },
      projects: function () {
        return '<div class="block">'
          + entry('autonomous electric vehicle', 'ros · c++ · jetson',
              'taught a small electric car to see and place itself in the world with lidar and a '
              + 'depth camera, then pick the widest gap ahead and steer through it on its own.')
          + entry('fast neural nets on gpus', 'cuda · c++ · hpc',
              'wrote GPU code by hand that beats nvidia\'s own sparse matrix library by ~1.5×, and '
              + 'pruned a network down to a fifth of its compute without losing meaningful accuracy. '
              + 'the whole forward pass is written from scratch, with zero ML frameworks.')
          + entry('battery insight', 'edge to cloud ml · 1st place · IEEE ECCE 2026',
              'a wireless battery brain that predicts state of charge from tiny models running '
              + 'both on the device and in the cloud. took first at mcmaster\'s capstone expo and got '
              + 'accepted to IEEE ECCE 2026.')
          + '</div>';
      },
      hobbies: function () {
        return '<div class="block">riding, hiking, paddle, tennis, swimming, and travelling '
          + 'every chance i get.</div>';
      },
      contact: function () {
        return '<div class="block">'
          + '<a href="' + LINKS.email + '">email</a> · '
          + '<a href="' + LINKS.github + '" target="_blank" rel="noopener">github</a> · '
          + '<a href="' + LINKS.linkedin + '" target="_blank" rel="noopener">linkedin</a>'
          + '</div>';
      },
      neofetch: function () {
        var rows = [
          ['os', 'human, v21'],
          ['role', 'electrical engineer'],
          ['uptime', 'online since 2004'],
          ['editor', 'vim (still figuring out :q)'],
          ['langs', 'c++, cuda, python, go, ts'],
          ['location', 'oakville, on'],
          ['timezone', 'america/toronto'],
          ['now', 'yyz → somewhere soon (yosemite maybe?)']
        ];
        var out = '<div class="block fetch">';
        for (var i = 0; i < rows.length; i++) {
          out += '<div class="frow"><span class="fk">' + rows[i][0] + '</span>'
            + '<span class="fv">' + rows[i][1] + '</span></div>';
        }
        return out + '</div>';
      },
      // easter eggs
      sudo: function () { return '<div class="block muted">nice try. you already have root here.</div>'; },
      coffee: function () { return '<div class="block muted">pouring a cup. brb.</div>'; },
      vim: function () { return '<div class="block muted">:q ... :q! ... :wq ... how do i leave</div>'; },
      ride: function () { return '<div class="block muted">somewhere between the barn and the finish line.</div>'; },
      'cd ..': function () { return '<div class="block muted">already at the top. this is as real as it gets.</div>'; },
      ping: function () { return '<div class="block muted">pong. still here.</div>'; },
      hostname: function () { return '<div class="block muted">yazan.local</div>'; },
      ssh: function () { return '<div class="block muted">connection refused. i\'m right here.</div>'; },
      exit: function () { return '<div class="block muted">nice try, there\'s no escaping this terminal.</div>'; },
      claude: function () { return '<div class="block muted">nuh-uh, don\'t summon it again 👻</div>'; }
    };
    var ALIASES = { who: 'whoami', me: 'about', experience: 'work', exp: 'work',
      cv: 'contact', links: 'contact', horses: 'hobbies', riding: 'hobbies',
      hobbys: 'hobbies', '?': 'help', fetch: 'neofetch', sys: 'neofetch', quit: 'exit' };
    var NAMES = ['about','work','projects','hobbies','contact','neofetch','help','clear','ls'];

    function entry(h, sub, d) {
      return '<div class="entry"><div class="h">' + h + '</div>'
        + '<div class="sub">' + sub + '</div>'
        + '<div class="d">' + d + '</div></div>';
    }

    var history = [], hpos = -1;
    var cmdCount = 0, hinted = false;
    var EGG_KEYS = { sudo: 1, coffee: 1, vim: 1, ride: 1, rm: 1,
      'cd ..': 1, ping: 1, hostname: 1, ssh: 1, exit: 1, claude: 1 };

    function maybeHint() {
      if (hinted || cmdCount < 3) return;
      hinted = true;
      print('<div class="block muted">psst — not everything is in <span class="accent">help</span>. '
        + 'try <span class="accent">sudo</span>, or <span class="accent">coffee</span> if it\'s late. '
        + 'a few others are hiding too.</div>');
    }

    function print(html) {
      var div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = html;
      log.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    function run(raw) {
      var cmd = (raw || '').trim().toLowerCase();
      if (!cmd) return;
      history.push(cmd); hpos = history.length;
      print('<div class="echo"><span class="p">$</span> ' + escapeHtml(cmd) + '</div>');
      if (cmd === 'clear') { log.innerHTML = ''; boot(false); return; }
      cmdCount++;
      var out;
      if (cmd === 'sudo' || cmd.indexOf('sudo ') === 0) { out = C.sudo(); hinted = true; }
      else if (cmd === 'rm' || cmd.indexOf('rm ') === 0) {
        out = '<div class="block muted">not on my watch.</div>'; hinted = true; }
      else {
        var key = ALIASES[cmd] || cmd;
        if (C[key]) { out = C[key](); if (EGG_KEYS[key]) hinted = true; }
        else { out = '<div class="block muted">' + escapeHtml(cmd)
          + ': command not found. try <span class="accent">help</span>.</div>'; }
      }
      print(out);
      maybeHint();
    }

    // live local clock (Toronto) + time-aware greeting
    function torontoParts() {
      try {
        var f = new Intl.DateTimeFormat('en-CA', {
          timeZone: 'America/Toronto', hour12: false,
          hour: '2-digit', minute: '2-digit', second: '2-digit' });
        var p = {}; f.formatToParts(new Date()).forEach(function (x) { p[x.type] = x.value; });
        return p;
      } catch (e) { return null; }
    }
    function tickClock() {
      var el = document.getElementById('clock'); if (!el) return;
      var p = torontoParts();
      if (p) el.textContent = p.hour + ':' + p.minute + ':' + p.second;
    }
    function greeting() {
      var p = torontoParts();
      var h = p ? parseInt(p.hour, 10) : (new Date()).getHours();
      if (h >= 5 && h < 12) return 'good morning';
      if (h >= 12 && h < 17) return 'good afternoon';
      if (h >= 17 && h < 22) return 'good evening';
      if (h >= 1 && h < 5) return 'burning the midnight oil';
      return 'still up?';
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]; });
    }

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { run(input.value); input.value = ''; }
      else if (e.key === 'ArrowUp') {
        if (hpos > 0) { hpos--; input.value = history[hpos]; e.preventDefault(); }
      } else if (e.key === 'ArrowDown') {
        if (hpos < history.length - 1) { hpos++; input.value = history[hpos]; }
        else { hpos = history.length; input.value = ''; }
      } else if (e.key === 'Tab' && !e.shiftKey) {
        var v = input.value.trim().toLowerCase();
        var m = NAMES.filter(function (n) { return n.indexOf(v) === 0; });
        if (v && m.length) { e.preventDefault(); input.value = m[0]; }
        // else: let Tab move focus normally (no trap)
      }
    });

    chips.addEventListener('click', function (e) {
      var b = e.target.closest('button[data-cmd]');
      if (!b) return;
      run(b.getAttribute('data-cmd'));
      input.focus();
    });

    // clicking anywhere on the screen focuses the prompt (unless selecting a link/text)
    screen.addEventListener('click', function (e) {
      if (e.target.closest('a, button')) return;
      if (window.getSelection().toString()) return;
      input.focus();
    });

    function boot(intro) {
      if (intro) {
        print('<div class="echo" style="margin-top:0"><span class="p">#</span> ' + greeting() + '</div>');
        print(C.whoami());
      }
      print('<div class="block muted" style="margin-top:.35rem">type <span class="accent">help</span> '
        + 'or tap a command below.</div>');
      screen.scrollTop = screen.scrollHeight;
    }

    tickClock();
    setInterval(tickClock, 1000);
    boot(true);
    var isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (!isTouch) input.focus({ preventScroll: true });
  })();
  </script>
</body>
